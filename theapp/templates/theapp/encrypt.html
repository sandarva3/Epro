<!DOCTYPE html>
<html>
  <head>
    <title>Encryption</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;
        padding: 20px;
      }

      h1 {
        color: #333;
        text-align: center;
        margin-bottom: 20px;
      }

      form {
        max-width: 400px;
        margin: 0 auto;
        background-color: #fff;
        border: 1px solid #ccc;
        padding: 20px;
        border-radius: 5px;
      }

      label {
        display: block;
        font-weight: bold;
        margin-bottom: 10px;
      }

      input[type="text"] {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 3px;
      }

      button[type="submit"] {
        margin-top: 20px;
        margin-left: 150px;
        background-color: #4caf50;
        color: #fff;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        border-radius: 3px;
        cursor: pointer;
      }

      h2 {
        margin-top: 20px;
        color: #333;
      }

      p {
        font-size: 18px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Encryption / <a href="{% url 'decrypt' %}">Decryption</a></h1>
    <form method="post">
      {% csrf_token %}
      <label for="input_text">Enter words:</label>
      <input type="text" name="input_text" id="input_text" required />
      <button type="submit">Encrypt</button>
    </form>
    <h2>Encrypted Version:</h2>
    <p>{{ encrypted_text }}</p>
  </body>
</html>
